        - list [ref=e268] [cursor=pointer]:
          - listitem [ref=e269]: Antigravity CLI
          - generic [ref=e270]: ">"
          - listitem [ref=e271]: Overview
        - heading "Antigravity CLI Overview" [level=1] [ref=e273]
        - paragraph [ref=e275]: The Antigravity CLI is the lightweight Terminal User Interface (TUI) surface of Antigravity. It brings the same core agentic capabilities as Antigravity 2.0—including multi-step reasoning, multi-file editing, tool calling, and conversation history—directly to your terminal.
        - paragraph [ref=e277]: The CLI is the ideal tool for keyboard-centric developers and remote SSH workflows, optimized for speed and low resource overhead.
        - 'heading "Philosophical Split: CLI vs. Antigravity 2.0" [level=3] [ref=e279]'
        - paragraph [ref=e281]: Antigravity CLI complements Antigravity 2.0 as a terminal-first alternative.
        - list [ref=e283]:
          - listitem [ref=e284]:
            - generic [ref=e285]:
              - strong [ref=e286]: CLI
              - text: ":"
            - text: Optimized for speed, keyboard efficiency, and low overhead.
          - listitem [ref=e287]:
            - generic [ref=e288]:
              - strong [ref=e289]: Antigravity 2.0
              - text: ":"
            - text: Optimized for comprehensiveness, visual orchestration, and project management.
        - paragraph [ref=e291]:
          - strong [ref=e292]: Integration Features
        - list [ref=e294]:
          - listitem [ref=e295]:
            - generic [ref=e296]:
              - strong [ref=e297]: Shared Agent Harness
              - text: ":"
            - text: Both products run on the same core agent engine. Any improvements to reasoning or tool use automatically apply to both.
          - listitem [ref=e298]:
            - generic [ref=e299]:
              - strong [ref=e300]: Shared Settings
              - text: ":"
            - text: Core preferences and permissions are shared. Changing a setting in the CLI updates it in the Antigravity, and vice versa.
          - listitem [ref=e301]:
            - generic [ref=e302]:
              - strong [ref=e303]: Conversation Export
              - text: ":"
            - text: While conversations are separate by default, you can easily export a CLI conversation to Antigravity 2.0 to continue with the agent-first interface.
        - heading "Getting Started & Migration" [level=3] [ref=e305]
        - paragraph [ref=e307]:
          - text: To install the CLI, follow the
          - link "Installation Guide" [ref=e308] [cursor=pointer]:
            - /url: /docs/cli-getting-started
          - text: .
        - heading "Migrating from Gemini CLI" [level=3] [ref=e310]
        - paragraph [ref=e312]:
          - text: If you are transitioning from Gemini CLI, the onboarding process supports a one-time import to automatically migrate your existing Gemini CLI extensions, skills, and settings. To learn more, read
          - link "Migrating from Gemini CLI" [ref=e313] [cursor=pointer]:
            - /url: /docs/gcli-migration
          - text: .
