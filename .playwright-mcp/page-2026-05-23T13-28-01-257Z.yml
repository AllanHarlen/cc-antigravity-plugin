        - heading "MCP Servers" [level=2] [ref=e396]
        - paragraph [ref=e398]:
          - text: Antigravity CLI supports both local and remote MCP servers and provides the same
          - code [ref=e399]: /mcp
          - text: command to manage them. The main difference from Gemini CLI is the file location where
          - code [ref=e400]: mcpServers
          - text: are defined.
        - paragraph [ref=e402]:
          - text: Antigravity and Antigravity CLI store MCP server configurations in a distinct
          - code [ref=e403]: mcp_config.json
          - text: file, whereas Gemini CLI stores them inline in your
          - code [ref=e404]: settings.json
          - text: .
