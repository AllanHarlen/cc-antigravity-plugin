          - listitem [ref=e271]: Migration
        - heading "Migrating from Gemini CLI" [level=1] [ref=e273]
        - paragraph [ref=e275]: If you are an existing Gemini CLI user looking to migrate your workflow to Antigravity CLI, you have come to the right place. The guide below will help you get familiar with and up and running quickly in Antigravity CLI.
        - generic [ref=e277]:
          - generic [ref=e278]: info
          - generic [ref=e279]:
            - strong [ref=e280]: TL;DR
            - text: ": Antigravity CLI supports the majority of features from Gemini CLI. While there is not 100% feature parity, workflow defining features like"
            - emphasis [ref=e281]: Gemini CLI extensions
            - text: (Antigravity plugins),
            - emphasis [ref=e282]: Agent Skills
            - text: ","
            - emphasis [ref=e283]: MCP servers
            - text: ","
            - emphasis [ref=e284]: hooks
            - text: ", and"
            - emphasis [ref=e285]: subagents
            - text: are all supported in Antigravity CLI.
        - paragraph [ref=e287]:
          - text: On the first launch of Antigravity CLI, you should see
          - strong [ref=e288]: Migration Options
          - text: where you can choose to migrate your existing Gemini CLI extensions to the equivalent
          - emphasis [ref=e289]: Antigravity Plugins
          - text: .
        - generic [ref=e291]:
          - generic [ref=e292]: info
          - generic [ref=e293]:
            - strong [ref=e294]: Note
            - text: ": Some Gemini CLI extensions cannot be migrated 1:1 to Antigravity plugins as some components (e.g., custom themes) are not currently supported."
        - paragraph [ref=e296]: For the majority of users, you can now get started using Antigravity CLI with the workflows you have come to love in Gemini CLI. Antigravity CLI loads in the same context files and global Agent Skills as Gemini CLI does.
        - paragraph [ref=e298]: If you notice something not working the way it should or how you expect, refer to the specific details below.
        - heading "Gemini CLI Extensions → Antigravity Plugins" [level=2] [ref=e300]
        - paragraph [ref=e302]:
          - text: Since Gemini CLI launched extensions (a way to extend the CLI by bundling and sharing capabilities), the industry has standardized on the term
          - strong [ref=e303]: plugins
          - text: . Antigravity plugins are supported in Antigravity CLI.
        - paragraph [ref=e305]: "Users should be prompted on the first launch of Antigravity CLI to have their extensions automatically migrated to plugins. You can also run an explicit command from your terminal to migrate them:"
        - generic [ref=e308]:
          - generic [ref=e310]: bash
          - button "content_copy" [ref=e311] [cursor=pointer]
          - code [ref=e314]: agy plugin import gemini
        - paragraph [ref=e316]:
          - text: Running the
          - code [ref=e317]: agy plugin import
          - text: "command will search for each locally installed extension and convert them to an Antigravity plugin:"
        - generic [ref=e320]:
          - generic [ref=e322]: text
          - button "content_copy" [ref=e323] [cursor=pointer]
          - code [ref=e326]: "[ok] conductor - skills : skipped (not found) - agents : skipped (not found) ✔ commands : 6 processed (converted to skills) - mcpServers : skipped (not found) - hooks : skipped (not found) [ok] google-workspace ✔ skills : 6 processed - agents : skipped (not found) ✔ commands : 4 processed (converted to skills) ✔ mcpServers : 1 processed - hooks : skipped (not found)"
        - heading "Context Files (Rules)" [level=2] [ref=e328]
        - paragraph [ref=e330]: "Antigravity CLI supports the same context files as Gemini CLI:"
        - list [ref=e332]:
          - listitem [ref=e333]:
            - generic [ref=e334]:
              - strong [ref=e335]: Workspace Context
              - text: ":"
            - generic [ref=e336]:
              - text: Reads both
              - code [ref=e337]: GEMINI.md
              - text: and
              - code [ref=e338]: AGENTS.md
              - text: from your active workspace directory.
          - listitem [ref=e339]:
            - generic [ref=e340]:
              - strong [ref=e341]: Global Context
              - text: ":"
            - generic [ref=e342]:
              - text: Automatically loads and enforces global constraints located at
              - code [ref=e343]: ~/.gemini/GEMINI.md
              - text: .
        - heading "Agent Skills" [level=2] [ref=e345]
        - paragraph [ref=e347]:
          - text: Agent Skills work in Antigravity CLI just as they do in Gemini CLI. They can be managed with the same
          - code [ref=e348]: /skills
          - text: command and are also converted into slash commands allowing them to be manually invoked.
        - paragraph [ref=e350]:
          - text: Global skills for Gemini CLI were located in
          - code [ref=e351]: ~/.gemini/skills/
          - text: and are shared with Antigravity CLI across all workspaces. No action is needed for global skills; they are picked up automatically.
        - paragraph [ref=e353]:
          - text: Workspace-specific skills for Antigravity CLI are stored in
          - code [ref=e354]: .agents/skills
          - text: ", which means if you have project/workspace skills in a given project within the"
          - code [ref=e355]: .gemini/skills
          - text: folder, they will need to be moved to
          - code [ref=e356]: .agents/skills
          - text: .
