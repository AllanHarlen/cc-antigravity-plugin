        - heading "Authentication" [level=3] [ref=e313]
        - paragraph [ref=e315]: Antigravity CLI attempts to authenticate you silently using your operating system's secure keyring. If no saved session is found, it will fall back to a browser-based Google Sign-In.
        - list [ref=e317]:
          - listitem [ref=e318]:
            - generic [ref=e319]:
              - strong [ref=e320]: Local Machine
              - text: ":"
            - text: The CLI will automatically open your default browser to the Google Sign-In page.
          - listitem [ref=e321]:
            - generic [ref=e322]:
              - strong [ref=e323]: Remote / SSH Session
              - text: ":"
            - text: The CLI will detect that you are in an SSH session and print a secure authorization URL. Copy this URL into your local browser to sign in, and then paste the resulting authorization code back into the CLI prompt.
          - listitem [ref=e324]:
            - generic [ref=e325]:
              - strong [ref=e326]: Logging Out
              - text: ":"
            - generic [ref=e327]:
              - text: To terminate your session and remove saved credentials, run the command
              - code [ref=e328]: /logout
              - text: .
        - paragraph [ref=e330]:
          - text: To login with your enterprise credentials, connect your GCP project as you onboard. For more information, visit the
          - link "Enterprise Documentation Page" [ref=e331] [cursor=pointer]:
            - /url: /docs/enterprise
          - text: .
